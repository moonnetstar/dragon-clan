# Prometheus 配置 - 龍族資源監控

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "dragon_alerts.yml"

scrape_configs:
  # 系統指標
  - job_name: "node"
    static_configs:
      - targets: ["dragon-node-exporter:9100"]

  # 容器指標
  - job_name: "cadvisor"
    static_configs:
      - targets: ["dragon-cadvisor:8080"]

  # Ollama 指標 (自定義 exporter)
  - job_name: "ollama"
    static_configs:
      - targets: ["dragon-ollama:11434"]
    metrics_path: "/api/metrics"

  # Agent Scheduler
  - job_name: "agent-scheduler"
    static_configs:
      - targets: ["dragon-router:8080"]
    metrics_path: "/status"
